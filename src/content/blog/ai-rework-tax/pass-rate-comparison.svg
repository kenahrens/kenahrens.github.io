<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="680" height="220" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">pass rate by condition (N=100)</text>

  <!-- Condition A bar -->
  <text x="195" y="82" text-anchor="end" font-size="13" fill="#555">Alert only</text>
  <rect x="210" y="65" width="224" height="28" rx="4" fill="#808184"/>
  <text x="442" y="84" font-size="14" font-weight="700" fill="#808184">51%</text>

  <!-- Condition B bar -->
  <text x="195" y="132" text-anchor="end" font-size="13" fill="#555">Alert + captures</text>
  <rect x="210" y="115" width="338" height="28" rx="4" fill="#FFA400"/>
  <text x="556" y="134" font-size="14" font-weight="700" fill="#e08f00">77%</text>

  <!-- Delta annotation -->
  <line x1="556" y1="88" x2="556" y2="118" stroke="#FFA400" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="574" y="108" font-size="12" font-weight="600" fill="#FFA400">+26pp</text>

  <!-- Scale line -->
  <line x1="210" y1="160" x2="650" y2="160" stroke="#ddd" stroke-width="1"/>
  <text x="210" y="178" text-anchor="middle" font-size="11" fill="#999">0%</text>
  <text x="320" y="178" text-anchor="middle" font-size="11" fill="#999">25%</text>
  <text x="430" y="178" text-anchor="middle" font-size="11" fill="#999">50%</text>
  <text x="540" y="178" text-anchor="middle" font-size="11" fill="#999">75%</text>
  <text x="650" y="178" text-anchor="middle" font-size="11" fill="#999">100%</text>
  <!-- Tick marks -->
  <line x1="210" y1="156" x2="210" y2="160" stroke="#ccc" stroke-width="1"/>
  <line x1="320" y1="156" x2="320" y2="160" stroke="#ccc" stroke-width="1"/>
  <line x1="430" y1="156" x2="430" y2="160" stroke="#ccc" stroke-width="1"/>
  <line x1="540" y1="156" x2="540" y2="160" stroke="#ccc" stroke-width="1"/>
  <line x1="650" y1="156" x2="650" y2="160" stroke="#ccc" stroke-width="1"/>

  <!-- CI whiskers -->
  <line x1="390" y1="79" x2="478" y2="79" stroke="#808184" stroke-width="1.5" opacity="0.4"/>
  <line x1="390" y1="75" x2="390" y2="83" stroke="#808184" stroke-width="1.5" opacity="0.4"/>
  <line x1="478" y1="75" x2="478" y2="83" stroke="#808184" stroke-width="1.5" opacity="0.4"/>

  <line x1="510" y1="129" x2="580" y2="129" stroke="#FFA400" stroke-width="1.5" opacity="0.4"/>
  <line x1="510" y1="125" x2="510" y2="133" stroke="#FFA400" stroke-width="1.5" opacity="0.4"/>
  <line x1="580" y1="125" x2="580" y2="133" stroke="#FFA400" stroke-width="1.5" opacity="0.4"/>

  <text x="340" y="200" text-anchor="middle" font-size="10" fill="#aaa">whiskers = 95% Wilson CI</text>
</svg>
