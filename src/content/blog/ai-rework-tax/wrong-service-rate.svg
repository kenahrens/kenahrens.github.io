<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="680" height="200" fill="#fafafa" rx="8"/>
  <text x="340" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">how often the agent went to the wrong service</text>

  <!-- Condition A -->
  <text x="195" y="82" text-anchor="end" font-size="13" fill="#555">Alert only</text>
  <rect x="210" y="65" width="299" height="28" rx="4" fill="#e57373"/>
  <rect x="210" y="65" width="119" height="28" rx="4" fill="#808184"/>
  <text x="254" y="84" font-size="11" fill="white" font-weight="600">found it</text>
  <text x="380" y="84" font-size="11" fill="white" font-weight="600">wrong service</text>
  <text x="520" y="84" font-size="14" font-weight="700" fill="#c62828">34%</text>

  <!-- Condition B -->
  <text x="195" y="132" text-anchor="end" font-size="13" fill="#555">Alert + captures</text>
  <rect x="210" y="115" width="299" height="28" rx="4" fill="#FFA400"/>
  <rect x="298" y="115" width="12" height="28" rx="0" fill="#e57373" opacity="0.7"/>
  <text x="250" y="134" font-size="11" fill="white" font-weight="600">found it</text>
  <text x="520" y="134" font-size="14" font-weight="700" fill="#FFA400">4%</text>

  <!-- Annotation -->
  <text x="340" y="174" text-anchor="middle" font-size="12" fill="#555">captures cut misdirected search by <tspan font-weight="700" fill="#FFA400">8x</tspan></text>
</svg>
