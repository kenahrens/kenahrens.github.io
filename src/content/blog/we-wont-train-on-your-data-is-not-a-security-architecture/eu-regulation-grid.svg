  <text x="82" y="108" text-anchor="middle" font-size="7.5" fill="#64748b">BDSG (2018)</text>

  <rect x="155" y="76" width="125" height="42" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="217" y="94" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa">France</text>
  <text x="217" y="108" text-anchor="middle" font-size="7.5" fill="#64748b">Loi Informatique</text>

  <rect x="290" y="76" width="125" height="42" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="352" y="94" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa">Italy</text>
  <text x="352" y="108" text-anchor="middle" font-size="7.5" fill="#64748b">D.Lgs. 196/2003</text>

  <rect x="425" y="76" width="125" height="42" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="487" y="94" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa">Spain</text>
  <text x="487" y="108" text-anchor="middle" font-size="7.5" fill="#64748b">LOPDGDD (2018)</text>

  <rect x="560" y="76" width="125" height="42" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="622" y="94" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa">Netherlands</text>
  <text x="622" y="108" text-anchor="middle" font-size="7.5" fill="#64748b">UAVG (2018)</text>

