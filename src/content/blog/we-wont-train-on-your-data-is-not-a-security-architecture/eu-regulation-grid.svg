  <rect x="20" y="386" width="10" height="10" rx="2" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="36" y="395" font-size="9" fill="#64748b">EU member state (27)</text>

  <rect x="180" y="386" width="10" height="10" rx="2" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="196" y="395" font-size="9" fill="#64748b">EEA non-EU (3)</text>

  <!-- GDPR base layer -->
  <rect x="20" y="416" width="665" height="40" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <rect x="20" y="416" width="665" height="40" rx="8" fill="#3b82f6" opacity="0.06"/>
  <text x="352" y="441" text-anchor="middle" font-size="12" font-weight="700" fill="#60a5fa">GDPR baseline</text>

  <!-- Bottom note -->
  <text x="350" y="490" text-anchor="middle" font-size="10" fill="#94a3b8">Each country exercises GDPR's ~70 opening clauses differently.</text>
  <text x="350" y="506" text-anchor="middle" font-size="10" fill="#94a3b8">"GDPR compliant" means 30 different things depending on where you operate.</text>
