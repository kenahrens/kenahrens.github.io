<svg viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>30 EU/EEA countries each enacted their own national data protection law on top of GDPR</title>
  <desc>Grid showing every EU and EEA member state with its own national data protection legislation layered on top of GDPR</desc>

  <defs>
    <linearGradient id="bgEU" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <style>
    text { font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif; }
  </style>

  <rect width="700" height="520" rx="12" fill="url(#bgEU)"/>

