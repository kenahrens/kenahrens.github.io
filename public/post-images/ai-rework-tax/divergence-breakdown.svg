<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="680" height="280" fill="#fafafa" rx="8"/>
  <text x="340" y="32" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">how the 100 bugs split</text>

  <!-- Four quadrant boxes -->
  <!-- Both pass -->
  <rect x="40" y="55" width="145" height="120" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="112" y="100" text-anchor="middle" font-size="36" font-weight="700" fill="#2e7d32">40</text>
  <text x="112" y="122" text-anchor="middle" font-size="12" fill="#555">both passed</text>
  <text x="112" y="140" text-anchor="middle" font-size="10" fill="#888">agent found it</text>
  <text x="112" y="154" text-anchor="middle" font-size="10" fill="#888">either way</text>

  <!-- B rescued -->
  <rect x="200" y="55" width="145" height="120" rx="6" fill="#fff3e0" stroke="#FFA400" stroke-width="2"/>
  <text x="272" y="100" text-anchor="middle" font-size="36" font-weight="700" fill="#e08f00">37</text>
  <text x="272" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#e08f00">captures rescued</text>
  <text x="272" y="140" text-anchor="middle" font-size="10" fill="#888">alert failed,</text>
  <text x="272" y="154" text-anchor="middle" font-size="10" fill="#888">captures fixed it</text>

  <!-- B hurt -->
  <rect x="360" y="55" width="145" height="120" rx="6" fill="#fce4ec" stroke="#e57373" stroke-width="1.5"/>
  <text x="432" y="100" text-anchor="middle" font-size="36" font-weight="700" fill="#c62828">11</text>
  <text x="432" y="122" text-anchor="middle" font-size="12" fill="#c62828">captures hurt</text>
  <text x="432" y="140" text-anchor="middle" font-size="10" fill="#888">alert passed,</text>
  <text x="432" y="154" text-anchor="middle" font-size="10" fill="#888">captures broke it</text>

  <!-- Both fail -->
  <rect x="520" y="55" width="125" height="120" rx="6" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1.5"/>
  <text x="582" y="100" text-anchor="middle" font-size="36" font-weight="700" fill="#757575">12</text>
  <text x="582" y="122" text-anchor="middle" font-size="12" fill="#757575">both failed</text>
  <text x="582" y="140" text-anchor="middle" font-size="10" fill="#888">too hard for</text>
  <text x="582" y="154" text-anchor="middle" font-size="10" fill="#888">this agent</text>

  <!-- Net calculation -->
  <text x="340" y="210" text-anchor="middle" font-size="13" fill="#555">37 rescued − 11 hurt = net <tspan font-weight="700" fill="#FFA400">+26 percentage points</tspan></text>

  <!-- Stacked bar showing the composition -->
  <rect x="80" y="232" width="200" height="16" rx="3" fill="#66bb6a" opacity="0.7"/>
  <rect x="280" y="232" width="185" height="16" rx="0" fill="#FFA400"/>
  <rect x="465" y="232" width="55" height="16" rx="0" fill="#e57373" opacity="0.7"/>
  <rect x="520" y="232" width="60" height="16" rx="3" fill="#bdbdbd" opacity="0.5"/>

  <text x="180" y="244" text-anchor="middle" font-size="9" fill="white" font-weight="600">40</text>
  <text x="372" y="244" text-anchor="middle" font-size="9" fill="white" font-weight="600">37</text>
  <text x="492" y="244" text-anchor="middle" font-size="9" fill="white" font-weight="600">11</text>
  <text x="550" y="244" text-anchor="middle" font-size="9" fill="white" font-weight="600">12</text>

  <text x="340" y="266" text-anchor="middle" font-size="10" fill="#aaa">100 bugs total</text>
</svg>
